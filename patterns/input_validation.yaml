id: input_validation
name: Input Validation
severity: medium
description: >
  Tests how tools handle unexpected, malformed, or edge-case inputs
  including empty strings, oversized payloads, and special characters.

target_params:
  applies_to_all: true
  param_type: "string"

payloads:
  - value: ""
    description: "Empty string"
    platform: "any"
  - value: ""
    description: "Oversized string (1KB+)"
    platform: "any"
  - value: "\u0000\u0000\u0000"
    description: "Null bytes"
    platform: "any"
  - value: "\ud83d\ude00\ud83c\udf1f\ud83e\udd16\ud83c\udde9\ud83c\uddea"
    description: "Unicode edge cases (emoji, flags)"
    platform: "any"
  - value: "<script>alert(1)</script>"
    description: "XSS payload"
    platform: "any"

detection:
  response_contains_any:
    - "Traceback"
    - "stack trace"
    - "NullPointer"
    - "segfault"
    - "SIGSEGV"
    - "panic:"
    - "core dumped"
  response_not_contains: []
