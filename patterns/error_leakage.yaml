id: error_leakage
name: Error Information Leakage
severity: high
description: >
  Tests whether error responses leak sensitive internal information
  such as file paths, stack traces, dependency versions, or database details.

target_params:
  applies_to_all: true
  param_type: "string"

payloads:
  - value: ""
    description: "Empty input to trigger error"
    platform: "any"
  - value: "null"
    description: "Null-like string"
    platform: "any"
  - value: "{{invalid}}"
    description: "Template injection probe"
    platform: "any"
  - value: "' OR '1'='1"
    description: "SQL injection probe"
    platform: "any"

detection:
  response_contains_any:
    - "Traceback"
    - "File \""
    - "/home/"
    - "/var/"
    - "/usr/"
    - "C:\\"
    - "node_modules"
    - "site-packages"
    - ".py\","
    - "connection"
    - "password"
    - "secret"
    - "token"
    - "sqlite"
    - "postgres"
    - "mysql"
    - "at line"
    - "stack trace"
  response_not_contains: []
