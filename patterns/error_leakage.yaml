id: error_leakage
name: Error Information Leakage
severity: high
description: >
  Tests whether error responses leak sensitive internal information
  such as file paths, stack traces, dependency versions, or database details.

target_params:
  applies_to_all: true
  param_type: "string"

payloads:
  - value: ""
    description: "Empty input to trigger error"
    platform: "any"
  - value: "null"
    description: "Null-like string"
    platform: "any"
  - value: "{{invalid}}"
    description: "Template injection probe"
    platform: "any"
  - value: "' OR '1'='1"
    description: "SQL injection probe"
    platform: "any"

detection:
  # Only indicators that strongly imply a *real* internal leak (stack traces,
  # server install paths, credential-assignment patterns). Plain words like
  # "password", "secret", "token", "sqlite" are too common — they match on
  # success messages ("encrypted successfully with password"), on tool output
  # that *returns* table names ("secrets, users"), and on ordinary parser
  # errors ("unrecognized token"). Plain "/home/", "/var/", "/usr/" match
  # any path echoed back in a rejection message, which is usually a design
  # requirement, not a leak.
  response_contains_any:
    - "Traceback (most recent call last)"
    - "stack trace"
    - "site-packages"
    - "dist-packages"
    - "node_modules"
    - ".py\", line "
    - "C:\\"
    - "password="
    - "secret_key"
    - "api_key="
    - "SECRET_"
  response_not_contains:
    - "successfully"
    - "succeeded"
