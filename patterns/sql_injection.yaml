id: sql_injection
name: SQL Injection
severity: critical
description: >
  Tests whether tools that accept query or data parameters properly
  sanitize input to prevent SQL injection attacks.

target_params:
  param_name_patterns:
    - "query"
    - "sql"
    - "search"
    - "filter"
    - "where"
    - "name"
    - "address"
    - "value"
    - "table"
    - "table_name"
    - "db_name"
  param_type: "string"

payloads:
  - value: "' OR '1'='1"
    description: "Classic tautology injection"
    platform: "any"
  - value: "'; SELECT sqlite_version();--"
    description: "SQLite version extraction"
    platform: "any"
  - value: "test' UNION SELECT sql FROM sqlite_master WHERE type='table'--"
    description: "Schema extraction via UNION"
    platform: "any"
  - value: "Robert'); DROP TABLE students;--"
    description: "Bobby Tables destructive injection"
    platform: "any"

detection:
  # Only schema-disclosure / successful-execution markers. Pure parser
  # errors are NOT treated as positive — many tools legitimately accept
  # free-form SQL and a syntax error there is expected behaviour.
  # "CREATE TABLE" on its own is too weak (appears in rejection messages
  # like "Only CREATE TABLE statements are allowed"), so the positives
  # require a real schema-catalog name to be present.
  response_contains_any:
    - "no such table"
    - "no such column"
    - "sqlite_master"
    - "information_schema"
    - "pg_catalog"
  response_not_contains:
    - "parameterized"
    - "sanitized"
    - "not allowed"
    - "invalid"
    - "blocked"
    - "rejected"
    - "syntax error"
    - "unrecognized token"
    - 'near "'
    - "are allowed"
