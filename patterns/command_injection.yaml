id: command_injection
name: Command Injection
severity: critical
description: >
  Tests whether tools that accept string parameters properly sanitize
  input to prevent shell command injection.

target_params:
  param_name_patterns:
    - "cmd"
    - "command"
    - "exec"
    - "run"
    - "shell"
    - "script"
    - "query"
    - "file"
    - "filename"
    - "file_name"
    - "filepath"
    - "file_path"
    - "path"
    - "input"
  param_type: "string"

payloads:
  - value: "echo hello; echo MCPFUZZ_INJECT_MARKER"
    description: "Semicolon injection with marker"
    platform: "any"
  - value: "echo hello && echo MCPFUZZ_INJECT_MARKER"
    description: "AND injection with marker"
    platform: "any"
  - value: "echo hello | echo MCPFUZZ_INJECT_MARKER"
    description: "Pipe injection with marker"
    platform: "any"
  - value: "echo $(echo MCPFUZZ_INJECT_MARKER)"
    description: "Command substitution injection"
    platform: "unix"
  - value: "echo `echo MCPFUZZ_INJECT_MARKER`"
    description: "Backtick injection"
    platform: "unix"
  - value: "/tmp/safe/test.txt; echo MCPFUZZ_INJECT_MARKER"
    description: "Path with semicolon injection"
    platform: "unix"
  - value: "/tmp/test.txt && echo MCPFUZZ_INJECT_MARKER"
    description: "Path with AND injection"
    platform: "unix"
  - value: "test.txt$(echo MCPFUZZ_INJECT_MARKER)"
    description: "Filename with command substitution"
    platform: "unix"
  - value: "test.txt|echo MCPFUZZ_INJECT_MARKER"
    description: "Filename with pipe injection"
    platform: "any"

detection:
  response_contains_any:
    - "MCPFUZZ_INJECT_MARKER"
  response_not_contains:
    - "not allowed"
    - "invalid"
    - "denied"
    - "error"
