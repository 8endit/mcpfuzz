id: resource_exhaustion
name: Resource Exhaustion
severity: medium
description: >
  Tests whether tools implement proper rate limiting, timeouts, and
  input size limits to prevent denial of service.

target_params:
  applies_to_all: true
  param_type: "string"

payloads:
  - value: ""
    description: "Large payload (1KB)"
    platform: "any"

detection:
  response_contains_any:
    - "timeout"
    - "timed out"
    - "too large"
    - "limit exceeded"
    - "rate limit"
    - "memory"
    - "out of memory"
  response_not_contains: []
